<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Doppler Prank Lab</title>
    <script>
      (() => {
        let theme = "light";

        try {
          const storedTheme = localStorage.getItem("theme");
          theme =
            storedTheme
            || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        } catch (_error) {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }

        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="layout">
        <section class="panel viz-panel">
          <div class="panel-heading panel-hero">
            <div class="hero-topbar">
              <div>
                <p class="eyebrow">Drive-by acoustics sandbox</p>
                <h1>Doppler Prank Lab</h1>
              </div>

              <button
                id="theme-toggle"
                class="theme-toggle secondary"
                type="button"
                aria-label="Switch to dark mode"
                aria-pressed="false"
              >
                <span class="theme-toggle-icon" aria-hidden="true">◐</span>
                <span id="theme-toggle-label">Dark mode</span>
              </button>
            </div>
          </div>

          <div class="stats-grid" id="stats-grid"></div>

          <div class="canvas-frame">
            <canvas id="scene-canvas" aria-label="Top-down simulation view"></canvas>
          </div>

          <div class="scene-overlay-controls">
            <label class="overlay-toggle" for="show-normal-locus">
              <input id="show-normal-locus" type="checkbox" />
              <span>Show sounds-normal locus</span>
            </label>
            <label class="overlay-toggle" for="circular-track">
              <input id="circular-track" type="checkbox" />
              <span>Circular track</span>
            </label>
          </div>

          <div class="legend">
            <span><i class="swatch car"></i>Car path</span>
            <span><i class="swatch target"></i>Target</span>
            <span><i class="swatch bystander"></i>Bystander</span>
            <span><i class="swatch prank"></i>Prank compensation</span>
          </div>
        </section>

        <div class="settings-sheet" id="settings-sheet">
          <div class="sheet-header">
            <span class="sheet-grabber"></span>
            <h2>Settings</h2>
            <button id="sheet-close" class="icon-button" aria-label="Close settings">×</button>
          </div>

          <div class="sheet-tabs" role="tablist">
            <button data-tab="controls" class="sheet-tab" role="tab" aria-selected="true">Controls</button>
            <button data-tab="audio" class="sheet-tab" role="tab" aria-selected="false">Audio</button>
            <button data-tab="chart" class="sheet-tab" role="tab" aria-selected="false">Chart</button>
          </div>

          <div class="sheet-body">
            <section class="panel controls-panel" data-tab="controls">
              <div class="panel-heading">
                <h2>Controls</h2>
              </div>

              <div class="transport">
                <button id="play-toggle" type="button">Pause</button>
                <button id="reset" type="button" class="secondary">Reset</button>
              </div>

              <div id="control-groups" class="control-groups"></div>
            </section>

            <section class="panel chart-panel" data-tab="chart">
              <div class="panel-heading">
                <h2>Frequency Plot</h2>
                <p>
                  Compare the natural Doppler shift with the compensated prank
                  pitch.
                </p>
              </div>

              <div class="canvas-frame chart-frame">
                <canvas id="chart-canvas" aria-label="Frequency chart"></canvas>
              </div>
            </section>

            <section class="panel audio-panel" data-tab="audio">
              <div class="panel-heading">
                <h2>Audio</h2>
              </div>

              <div class="live-audio-card">
                <div class="live-audio-header">
                  <div>
                    <h3>Live Monitor</h3>
                  </div>
                  <label class="live-toggle" for="live-audio-toggle">
                    <input id="live-audio-toggle" type="checkbox" />
                    <span class="live-toggle-track" aria-hidden="true"></span>
                  </label>
                </div>

                <div class="live-monitor-field">
                  <span>Live source</span>
                  <div class="radio-inputs" role="radiogroup" aria-label="Live source">
                    <label class="radio">
                      <input id="live-source-synth" type="radio" name="live-source-mode" value="synth" />
                      <span class="name">Tone</span>
                    </label>
                    <label class="radio">
                      <input id="live-source-siren" type="radio" name="live-source-mode" value="siren" checked />
                      <span class="name">Siren</span>
                    </label>
                    <label class="radio">
                      <input id="live-source-song" type="radio" name="live-source-mode" value="song" />
                      <span class="name">Song</span>
                    </label>
                  </div>
                </div>

                <div class="live-monitor-field">
                  <span>Listen from</span>
                  <div class="radio-inputs" role="radiogroup" aria-label="Listen from">
                    <label class="radio">
                      <input id="live-perspective-car" type="radio" name="live-perspective" value="car" />
                      <span class="name">Car</span>
                    </label>
                    <label class="radio">
                      <input id="live-perspective-target" type="radio" name="live-perspective" value="target" checked />
                      <span class="name">Target</span>
                    </label>
                    <label class="radio">
                      <input id="live-perspective-bystander" type="radio" name="live-perspective" value="bystander" />
                      <span class="name">Bystander</span>
                    </label>
                  </div>
                </div>

                <div class="live-monitor-field">
                  <span>Effect mode</span>
                  <div class="radio-inputs" role="radiogroup" aria-label="Effect mode">
                    <label class="radio">
                      <input id="audio-effect-prank" type="radio" name="audio-effect-mode" value="prank" checked />
                      <span class="name">Prank</span>
                    </label>
                    <label class="radio">
                      <input id="audio-effect-normal" type="radio" name="audio-effect-mode" value="normal" />
                      <span class="name">Normal</span>
                    </label>
                  </div>
                </div>

                <div class="song-progress" id="song-progress" hidden>
                  <div class="song-progress-bar" role="progressbar" aria-label="Song position">
                    <div class="song-progress-fill" id="song-progress-fill"></div>
                  </div>
                  <div class="song-progress-time">
                    <span id="song-progress-current">0:00</span>
                    <span id="song-progress-total">0:00</span>
                  </div>
                </div>

                <p class="live-audio-status" id="live-audio-status"></p>
              </div>

              <div class="audio-box">
                <div class="audio-controls">
                  <label id="file-picker" class="file-picker">
                    <span>Upload audio</span>
                    <input id="audio-upload" type="file" accept="audio/*" />
                  </label>

                  <div id="uploaded-audio" class="uploaded-audio" hidden>
                    <div class="uploaded-audio-meta">
                      <span id="uploaded-audio-name" class="uploaded-audio-name"></span>
                    </div>

                    <button
                      id="remove-audio"
                      class="icon-button"
                      type="button"
                      aria-label="Remove uploaded audio"
                    >
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path
                          d="M9 3h6l1 2h4v2H4V5h4l1-2zm1 7h2v8h-2v-8zm4 0h2v8h-2v-8zM7 10h2v8H7v-8zm1 10h8a2 2 0 0 0 2-2V8H6v10a2 2 0 0 0 2 2z"
                          fill="currentColor"
                        />
                      </svg>
                    </button>
                  </div>
                </div>

                <p id="audio-status" class="audio-status">
                </p>
              </div>

            </section>
          </div>
        </div>

        <div class="sheet-backdrop" id="sheet-backdrop" hidden></div>
      </main>

      <div class="mobile-bar" id="mobile-bar">
        <button id="play-toggle-mobile" class="mobile-bar-btn" aria-label="Play/pause">Pause</button>
        <button id="reset-mobile" class="mobile-bar-btn secondary" aria-label="Reset">Reset</button>
        <button id="settings-open" class="mobile-bar-btn primary">Settings</button>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/state.js?v=3"></script>
    <script src="js/dom.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/audio.js?v=3"></script>
    <script src="js/render.js?v=3"></script>
    <script src="js/events.js?v=3"></script>
    <script src="js/mobile.js"></script>
    <script>
      (() => {
        function readTheme() {
          return document.documentElement.dataset.theme === "dark" ? "dark" : "light";
        }

        function writeTheme(theme) {
          const nextTheme = theme === "dark" ? "dark" : "light";
          document.documentElement.dataset.theme = nextTheme;

          try {
            localStorage.setItem("theme", nextTheme);
          } catch (_error) {
            // Ignore storage issues and still apply the theme for this session.
          }

          const button = document.getElementById("theme-toggle");
          const label = document.getElementById("theme-toggle-label");
          const upcomingTheme = nextTheme === "dark" ? "light" : "dark";

          if (button) {
            button.setAttribute("aria-pressed", String(nextTheme === "dark"));
            button.setAttribute("aria-label", `Switch to ${upcomingTheme} mode`);
          }

          if (label) {
            label.textContent = upcomingTheme === "dark" ? "Dark mode" : "Light mode";
          }

          document.dispatchEvent(
            new CustomEvent("themechange", {
              detail: { theme: nextTheme },
            }),
          );
        }

        function toggleTheme() {
          writeTheme(readTheme() === "dark" ? "light" : "dark");
        }

        window.__dopplerTheme = {
          readTheme,
          writeTheme,
          toggleTheme,
        };

        window.addEventListener("DOMContentLoaded", () => {
          const button = document.getElementById("theme-toggle");
          if (button) {
            button.addEventListener("click", toggleTheme);
          }

          writeTheme(readTheme());
        });
      })();
    </script>
  </body>
</html>
