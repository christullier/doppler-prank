<!DOCTYPE html>
<html lang="en">

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" href="data:," />
    <title>Doppler Prank Lab</title>
    <script>
      (() => {
        let theme = "light";

        try {
          const storedTheme = localStorage.getItem("theme");
          theme =
            storedTheme
            || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        } catch (_error) {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }

        document.documentElement.dataset.theme = theme;
      })();
    </script>

    <script src="js/events.js?v=5"></script>
    <script src="js/mobile.js?v=2"></script>
    <script>
      (() => {
        function readTheme() {
          return document.documentElement.dataset.theme === "dark" ? "dark" : "light";
        }

        function writeTheme(theme) {
          const nextTheme = theme === "dark" ? "dark" : "light";
          document.documentElement.dataset.theme = nextTheme;

          try {
            localStorage.setItem("theme", nextTheme);
          } catch (_error) {
            // Ignore storage issues and still apply the theme for this session.
          }

          const buttons = Array.from(document.querySelectorAll("[data-theme-toggle]"));
          const labels = Array.from(document.querySelectorAll("[data-theme-toggle-label]"));
          const upcomingTheme = nextTheme === "dark" ? "light" : "dark";

          buttons.forEach((button) => {
            button.setAttribute("aria-pressed", String(nextTheme === "dark"));
            button.setAttribute("aria-label", `Switch to ${upcomingTheme} mode`);
          });

          labels.forEach((label) => {
            label.textContent = upcomingTheme === "dark" ? "Dark mode" : "Light mode";
          });

          document.dispatchEvent(
            new CustomEvent("themechange", {
              detail: { theme: nextTheme },
            }),
          );
        }

        function toggleTheme() {
          writeTheme(readTheme() === "dark" ? "light" : "dark");
        }

        window.__dopplerTheme = {
          readTheme,
          writeTheme,
          toggleTheme,
        };

        window.addEventListener("DOMContentLoaded", () => {
          document.querySelectorAll("[data-theme-toggle]").forEach((button) => {
            button.addEventListener("click", toggleTheme);
          });

          writeTheme(readTheme());
        });
      })();
    </script>
